version: "3.9"

services:
  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - MCP_URL=http://mcp:8000
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    depends_on:
      - mcp
    restart: unless-stopped

  mcp:
    build: .
    command: ["python", "-m", "uvicorn", "server.mcp_server:app",
              "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
